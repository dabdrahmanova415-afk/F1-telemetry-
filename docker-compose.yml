version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1pass
      POSTGRES_DB: f1telemetry
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/testpass
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

  simulator:
    build: ./simulator
    container_name: simulator
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER: mosquitto
    restart: unless-stopped

  processor:
    build: ./processor
    container_name: processor
    depends_on:
      - mosquitto
      - postgres
      - mongodb
      - neo4j
    environment:
      MQTT_BROKER: mosquitto
      POSTGRES_HOST: postgres
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1pass
      POSTGRES_DB: f1telemetry
      MONGO_HOST: mongodb
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpass
    restart: unless-stopped

  dash:
    build: ./dash
    container_name: dash
    ports:
      - "8050:8050"
    depends_on:
      - postgres
      - mongodb
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1pass
      POSTGRES_DB: f1telemetry
      MONGO_HOST: mongodb
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
  neo4jdata:
