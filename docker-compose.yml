version: '3.9'

services:

  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: telemetry


  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/testpass
    ports:
      - "7474:7474"
      - "7687:7687"

  processor:
    build: .
    command: python -u processor.py
    depends_on:
      - mosquitto
      - mysql
      - mongodb
      - neo4j

  simulator:
    build: .
    command: python -u simulator.py
    depends_on:
      - mosquitto
